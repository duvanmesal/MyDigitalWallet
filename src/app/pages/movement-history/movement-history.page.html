<ion-header class="ion-no-border hist-header">
  <ion-toolbar>
    <div class="header-inner">
      <button class="back-btn" type="button" (click)="goBack()">
        <ion-icon name="arrow-back"></ion-icon>
      </button>
      <span class="header-title">Movimientos</span>
      <button class="reset-btn" type="button" (click)="resetFilters()">
        <ion-icon name="refresh-outline"></ion-icon>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- ══════ STATS SUMMARY ══════ -->
  <div class="stats-section">
    <div class="stat-main">
      <p class="stat-label">// GASTADO EN EL PERIODO</p>
      <h1 class="stat-amount">${{ (totalExpense$ | async) ?? 0 | number:'1.0-0' }}</h1>
    </div>
  </div>

  <!-- ══════ FILTERS ══════ -->
  <section class="filters-section">
    <p class="section-label">FILTRAR POR TARJETA</p>
    <div class="filter-chips">
      <button
        class="filter-chip"
        [class.active]="selectedMethodId === ''"
        (click)="applyMethodFilter('')">
        TODAS
      </button>
      <button
        class="filter-chip"
        *ngFor="let m of paymentMethods$ | async"
        [class.active]="selectedMethodId === m.id"
        [class.visa]="m.paymentNetwork === 'visa'"
        [class.mc]="m.paymentNetwork === 'mastercard'"
        (click)="applyMethodFilter(m.id ?? '')">
        •••• {{ m.cardTail }}
      </button>
    </div>

    <div class="date-filter">
      <p class="section-label">DESDE</p>
      <app-date-selector
        label="dd/mm/aaaa"
        (dateChanged)="handleDateChange($event)">
      </app-date-selector>
    </div>
  </section>

  <!-- ══════ RECORDS ══════ -->
  <section class="records-section">
    <p class="section-label">// HISTORY</p>

    <ng-container *ngIf="filteredRecords$ | async as records">

      <!-- Empty State -->
      <div class="records-empty" *ngIf="records.length === 0">
        <div class="empty-box">
          <ion-icon name="receipt-outline"></ion-icon>
          <p class="empty-title">Sin movimientos</p>
          <p class="empty-sub">No hay transacciones para los filtros seleccionados</p>
        </div>
      </div>

      <!-- Records List -->
      <div class="records-list" *ngIf="records.length > 0">
        <app-record-list
          [recordsList]="records"
          (recordLongPressed)="openReactionPicker($event)">
        </app-record-list>
      </div>

    </ng-container>
  </section>

</ion-content>

<!-- ══════ REACTION MODAL ══════ -->
<ion-modal
  [isOpen]="!!selectedRecordForReaction"
  (didDismiss)="closeReactionPicker()"
  [initialBreakpoint]="0.42"
  [breakpoints]="[0, 0.42]">
  <ng-template>
    <div class="modal-sheet" *ngIf="selectedRecordForReaction">
      <div class="modal-header">
        <h3>{{ selectedRecordForReaction.vendor }}</h3>
        <button class="close-btn" (click)="closeReactionPicker()">✕</button>
      </div>
      <div class="modal-body">
        <p class="reaction-subtitle">¿Cómo fue este gasto?</p>
        <div class="reaction-grid">
          <button
            class="reaction-btn"
            *ngFor="let r of quickReactions"
            (click)="applyReaction(r)">
            {{ r }}
          </button>
        </div>
      </div>
    </div>
  </ng-template>
</ion-modal>
