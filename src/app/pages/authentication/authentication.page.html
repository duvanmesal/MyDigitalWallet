<ion-content class="auth-content">
  <div class="auth-container">

    <!-- ══════ HERO ══════ -->
    <div class="hero-section">
      <div class="brand">
        <span class="brand-prefix">digital/</span>
        <span class="brand-name">wallet</span>
      </div>

      <h1 class="hero-title">
        Tu dinero.<br>
        <span class="accent">bien hecho.</span>
      </h1>

      <span class="version-tag">V2.0 · NEW</span>
    </div>

    <!-- ══════ FORM ══════ -->
    <div class="form-section">
      <p class="form-label">// INGRESA A TU CUENTA</p>

      <form [formGroup]="formData" (ngSubmit)="handleSubmit()">

        <!-- Email -->
        <div class="field-group">
          <label class="field-label">CORREO ELECTRÓNICO</label>
          <input
            class="neo-input"
            type="email"
            formControlName="emailAddress"
            autocomplete="email"
            placeholder="jose.carlos@mail.co">
          <span class="field-error" *ngIf="formData.controls.emailAddress.touched && formData.controls.emailAddress.invalid">
            Correo no válido
          </span>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="field-label">CONTRASEÑA</label>
          <input
            class="neo-input"
            type="password"
            formControlName="accessPassword"
            autocomplete="current-password"
            placeholder="••••••••">
          <span class="field-hint">Mínimo 8 caracteres</span>
          <span class="field-error" *ngIf="formData.controls.accessPassword.touched && formData.controls.accessPassword.invalid">
            Mínimo 6 caracteres
          </span>
        </div>

        <!-- Biometric Toggle -->
        <div class="field-group biometric-row" *ngIf="biometryAvailable">
          <label class="field-label">BIOMÉTRICO</label>
          <div class="bio-hint">Face ID · Huella</div>
        </div>

        <!-- Submit -->
        <button class="neo-btn primary" type="submit" [disabled]="isProcessing">
          <ion-spinner *ngIf="isProcessing" name="crescent"></ion-spinner>
          <ng-container *ngIf="!isProcessing">
            ENTRAR
            <span class="btn-arrow">→</span>
          </ng-container>
        </button>

        <!-- Divider -->
        <div class="divider">
          <span>O</span>
        </div>

        <!-- Google -->
        <button
          class="neo-btn outline"
          type="button"
          (click)="handleGoogleSignIn()"
          [disabled]="isProcessing">
          CONTINUAR CON GOOGLE
        </button>

        <!-- Biometry Button -->
        <button
          *ngIf="biometryAvailable"
          class="neo-btn outline"
          type="button"
          (click)="handleBiometricSignIn()"
          [disabled]="isProcessing">
          <ion-icon name="finger-print"></ion-icon>
          BIOMÉTRICO
        </button>

        <!-- Sign Up Link -->
        <p class="signup-link">
          ¿Aún no tienes cuenta?
          <button type="button" class="link-btn" (click)="navigateToEnrollment()">Crear cuenta</button>
        </p>

      </form>
    </div>

  </div>
</ion-content>
